<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AION2 裝備製作計算器 | 系列套裝合併模式</title>
  <meta name="description" content="AION2 永恆紀元2 裝備製作成本計算器 — 依照裝備系列分組，支援多件裝備材料合併計算">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚔️</text></svg>">
  <style>
/* ============================================================
   AION2 裝備製作成本計算器 — 遊戲暗色主題
   ============================================================ */

/* ---------- Google Fonts ---------- */
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=Orbitron:wght@400;700;900&display=swap');

/* ---------- CSS Custom Properties ---------- */
:root {
  --bg-primary: #060a14;
  --bg-secondary: #0c1222;
  --bg-card: rgba(14, 22, 42, 0.85);
  --bg-card-hover: rgba(20, 30, 56, 0.95);
  --bg-input: rgba(10, 16, 30, 0.9);
  --border-glow: rgba(100, 160, 255, 0.15);
  --border-dim: rgba(60, 80, 120, 0.3);
  --text-primary: #e8ecf4;
  --text-secondary: #8b9cc0;
  --text-dim: #556080;
  --accent-blue: #4d9fff;
  --accent-cyan: #00d4ff;
  --accent-gold: #ffd700;
  --accent-purple: #b366ff;
  --accent-red: #ff4d6a;
  --grade-epic: #ffd700;
  --grade-unique: #b366ff;
  --grade-rare: #4d9fff;
  --glass-bg: rgba(16, 24, 48, 0.7);
  --glass-border: rgba(100, 160, 255, 0.1);
  --shadow-glow: 0 0 30px rgba(77, 159, 255, 0.08);
  --radius-sm: 6px;
  --radius-md: 12px;
  --radius-lg: 18px;
  --radius-xl: 24px;
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ---------- Reset & Base ---------- */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.6;
  overflow-x: hidden;
}

/* 全域背景粒子效果 */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: 
    radial-gradient(ellipse at 20% 20%, rgba(77, 159, 255, 0.05) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(179, 102, 255, 0.04) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(0, 212, 255, 0.02) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* ---------- Header ---------- */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(6, 10, 20, 0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--glass-border);
  padding: 0 32px;
}

.header-inner {
  max-width: 1600px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 72px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: 900;
  color: var(--bg-primary);
  box-shadow: 0 0 20px rgba(0, 212, 255, 0.3);
}

.logo-text {
  font-family: 'Orbitron', sans-serif;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 2px;
  background: linear-gradient(135deg, #fff 30%, var(--accent-cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.logo-subtitle {
  font-size: 12px;
  color: var(--text-secondary);
  font-weight: 400;
  letter-spacing: 1px;
}

.header-info {
  display: flex;
  align-items: center;
  gap: 20px;
  font-size: 13px;
  color: var(--text-dim);
}

.header-info span {
  display: flex;
  align-items: center;
  gap: 6px;
}

/* ---------- Main Layout ---------- */
.main-container {
  max-width: 1600px;
  margin: 0 auto;
  padding: 24px 32px 60px;
  position: relative;
  z-index: 1;
}

.content-grid {
  display: grid;
  grid-template-columns: 320px 1fr;
  gap: 24px;
  align-items: start;
}

/* ---------- Sidebar (左側裝備選擇面板) ---------- */
.sidebar {
  position: sticky;
  top: 96px;
  max-height: calc(100vh - 120px);
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: rgba(77, 159, 255, 0.3) transparent;
}

.sidebar::-webkit-scrollbar {
  width: 4px;
}
.sidebar::-webkit-scrollbar-track {
  background: transparent;
}
.sidebar::-webkit-scrollbar-thumb {
  background: rgba(77, 159, 255, 0.3);
  border-radius: 4px;
}

.panel {
  background: var(--bg-card);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-lg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  overflow: hidden;
}

.panel-header {
  padding: 18px 20px;
  border-bottom: 1px solid var(--border-dim);
  display: flex;
  align-items: center;
  gap: 10px;
}

.panel-header h2 {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: 0.5px;
}

.panel-header .icon {
  font-size: 18px;
}

/* 武器類型篩選 */
.filter-tabs {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border-dim);
}

.filter-tab {
  padding: 6px 14px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  background: rgba(30, 40, 70, 0.5);
  border: 1px solid transparent;
  border-radius: 20px;
  cursor: pointer;
  transition: var(--transition);
  white-space: nowrap;
}

.filter-tab:hover {
  color: var(--accent-cyan);
  border-color: rgba(0, 212, 255, 0.3);
  background: rgba(0, 212, 255, 0.08);
}

.filter-tab.active {
  color: var(--bg-primary);
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
  border-color: transparent;
  box-shadow: 0 0 16px rgba(0, 212, 255, 0.3);
}

/* 裝備列表 */
.equipment-list {
  padding: 8px;
}

.equipment-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: var(--transition);
  border: 1px solid transparent;
}

.equipment-item:hover {
  background: rgba(77, 159, 255, 0.06);
  border-color: rgba(77, 159, 255, 0.12);
}

.equipment-item.selected {
  background: rgba(77, 159, 255, 0.1);
  border-color: rgba(77, 159, 255, 0.25);
  box-shadow: inset 0 0 20px rgba(77, 159, 255, 0.05);
}

.equipment-item .item-icon {
  width: 48px;
  height: 48px;
  border-radius: var(--radius-sm);
  overflow: hidden;
  flex-shrink: 0;
  position: relative;
  border: 2px solid var(--border-dim);
  background: rgba(0, 0, 0, 0.3);
}

.equipment-item .item-icon img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.equipment-item .item-icon.grade-epic {
  border-color: rgba(255, 215, 0, 0.5);
  box-shadow: 0 0 8px rgba(255, 215, 0, 0.15);
}

.equipment-item .item-icon.grade-unique {
  border-color: rgba(179, 102, 255, 0.5);
  box-shadow: 0 0 8px rgba(179, 102, 255, 0.15);
}

.equipment-item .item-name {
  font-size: 13px;
  font-weight: 500;
  line-height: 1.3;
}

.equipment-item .item-name.epic {
  color: var(--grade-epic);
}

.equipment-item .item-name.unique {
  color: var(--grade-unique);
}

.equipment-item .item-category {
  font-size: 11px;
  color: var(--text-dim);
  margin-top: 2px;
}

/* ---------- 主要內容區 (右側) ---------- */
.main-content {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

/* 裝備詳情卡片 */
.equipment-detail {
  background: var(--bg-card);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-xl);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding: 32px;
  display: grid;
  grid-template-columns: 260px 1fr;
  gap: 32px;
  position: relative;
  overflow: hidden;
}

.equipment-detail::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle at 30% 30%, rgba(255, 215, 0, 0.03) 0%, transparent 40%);
  pointer-events: none;
}

.equip-preview {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}

.equip-image-frame {
  width: 220px;
  height: 220px;
  border-radius: 50%;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  background: radial-gradient(circle, rgba(20, 28, 50, 0.9) 0%, rgba(10, 14, 26, 0.95) 70%);
  border: 2px solid rgba(255, 215, 0, 0.2);
  box-shadow: 
    0 0 40px rgba(255, 215, 0, 0.08),
    inset 0 0 40px rgba(0, 0, 0, 0.4);
}

.equip-image-frame::before {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  border: 1px solid rgba(255, 215, 0, 0.1);
  animation: orbit-pulse 4s ease-in-out infinite;
}

@keyframes orbit-pulse {
  0%, 100% { opacity: 0.3; transform: scale(1); }
  50% { opacity: 0.8; transform: scale(1.02); }
}

.equip-image-frame img {
  width: 75%;
  height: 75%;
  object-fit: contain;
  filter: drop-shadow(0 4px 20px rgba(255, 215, 0, 0.2));
  transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

.equip-image-frame:hover img {
  transform: scale(1.08) rotate(3deg);
}

.equip-name {
  font-size: 22px;
  font-weight: 700;
  text-align: center;
  line-height: 1.4;
}

.equip-name.epic {
  color: var(--grade-epic);
  text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
}

.equip-grade-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 16px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 1px;
  border-radius: 20px;
  text-transform: uppercase;
}

.equip-grade-badge.epic {
  background: linear-gradient(135deg, rgba(255, 215, 0, 0.15), rgba(255, 170, 0, 0.1));
  color: var(--grade-epic);
  border: 1px solid rgba(255, 215, 0, 0.3);
}

/* 材料區域 */
.equip-materials {
  position: relative;
  z-index: 1;
}

.equip-materials h3 {
  font-size: 15px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

/* ---------- 材料清單 ---------- */
.materials-grid {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.material-row {
  display: grid;
  grid-template-columns: 48px 1fr 80px 160px 140px;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  background: rgba(12, 18, 34, 0.6);
  border: 1px solid var(--border-dim);
  border-radius: var(--radius-md);
  transition: var(--transition);
}

.material-row:hover {
  border-color: rgba(100, 160, 255, 0.2);
  background: rgba(16, 24, 46, 0.7);
}

.material-icon {
  width: 44px;
  height: 44px;
  border-radius: var(--radius-sm);
  overflow: hidden;
  border: 2px solid var(--border-dim);
  background: rgba(0, 0, 0, 0.3);
  flex-shrink: 0;
}

.material-icon img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.material-icon.grade-epic {
  border-color: rgba(255, 215, 0, 0.4);
}
.material-icon.grade-unique {
  border-color: rgba(179, 102, 255, 0.4);
}

.material-info {
  min-width: 0;
}

.material-name {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-primary);
  line-height: 1.3;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.material-name.epic { color: var(--grade-epic); }
.material-name.unique { color: var(--grade-unique); }

.material-qty {
  font-size: 13px;
  color: var(--accent-cyan);
  font-weight: 600;
  text-align: center;
}

.material-qty span {
  color: var(--text-dim);
  font-weight: 400;
}

/* 價格輸入 */
.price-input-wrapper {
  position: relative;
  display: flex;
  align-items: center;
}

.price-input {
  width: 100%;
  height: 36px;
  padding: 0 12px 0 28px;
  background: var(--bg-input);
  border: 1px solid var(--border-dim);
  border-radius: var(--radius-sm);
  color: var(--text-primary);
  font-size: 13px;
  font-family: 'Noto Sans TC', sans-serif;
  transition: var(--transition);
  outline: none;
}

.price-input::placeholder {
  color: var(--text-dim);
}

.price-input:focus {
  border-color: var(--accent-blue);
  box-shadow: 0 0 0 3px rgba(77, 159, 255, 0.1);
}

.price-currency {
  position: absolute;
  left: 10px;
  font-size: 12px;
  color: var(--accent-gold);
  pointer-events: none;
}

/* 小計 */
.material-subtotal {
  font-size: 13px;
  font-weight: 600;
  text-align: right;
  color: var(--text-secondary);
  white-space: nowrap;
}

.material-subtotal.has-value {
  color: var(--accent-gold);
}

/* ---------- 總成本匯總 ---------- */
.cost-summary {
  background: var(--bg-card);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-xl);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  padding: 28px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
  overflow: hidden;
}

.cost-summary::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent-gold), var(--accent-cyan), transparent);
  opacity: 0.6;
}

.cost-label {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.cost-label h3 {
  font-size: 14px;
  font-weight: 500;
  color: var(--text-secondary);
  letter-spacing: 0.5px;
}

.cost-label p {
  font-size: 12px;
  color: var(--text-dim);
}

.cost-total {
  display: flex;
  align-items: baseline;
  gap: 8px;
}

.cost-amount {
  font-family: 'Orbitron', sans-serif;
  font-size: 36px;
  font-weight: 900;
  background: linear-gradient(135deg, var(--accent-gold), #ffaa00);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 1px;
}

.cost-currency {
  font-size: 16px;
  color: var(--accent-gold);
  font-weight: 600;
  opacity: 0.8;
}

/* 操作按鈕 */
.cost-actions {
  display: flex;
  gap: 10px;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 20px;
  font-size: 13px;
  font-weight: 600;
  font-family: 'Noto Sans TC', sans-serif;
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: var(--transition);
}

.btn-primary {
  background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
  color: var(--bg-primary);
  box-shadow: 0 4px 16px rgba(77, 159, 255, 0.3);
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(77, 159, 255, 0.4);
}

.btn-secondary {
  background: rgba(30, 40, 70, 0.6);
  color: var(--text-secondary);
  border: 1px solid var(--border-dim);
}

.btn-secondary:hover {
  color: var(--accent-cyan);
  border-color: rgba(0, 212, 255, 0.3);
}

/* ---------- 空狀態 ---------- */
.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 40px;
  text-align: center;
}

.empty-state .icon {
  font-size: 64px;
  margin-bottom: 20px;
  opacity: 0.5;
}

.empty-state h3 {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 8px;
}

.empty-state p {
  font-size: 14px;
  color: var(--text-dim);
  max-width: 360px;
}

/* ---------- 預設道具圖片 ---------- */
.default-item-icon {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, rgba(30, 40, 70, 0.8), rgba(20, 28, 50, 0.9));
  font-size: 20px;
  color: var(--text-dim);
}

/* ---------- 響應式佈局 ---------- */
@media (max-width: 1100px) {
  .content-grid {
    grid-template-columns: 1fr;
  }

  .sidebar {
    position: static;
    max-height: none;
  }

  .equipment-detail {
    grid-template-columns: 1fr;
  }

  .equip-preview {
    flex-direction: row;
    align-items: center;
  }

  .equip-image-frame {
    width: 140px;
    height: 140px;
  }

  .material-row {
    grid-template-columns: 40px 1fr 60px 120px auto;
    gap: 8px;
    padding: 8px 10px;
  }
}

@media (max-width: 768px) {
  .header {
    padding: 0 16px;
  }

  .header-inner {
    height: 56px;
  }

  .logo-text {
    font-size: 16px;
  }

  .header-info {
    display: none;
  }

  .main-container {
    padding: 16px;
  }

  .equipment-detail {
    padding: 20px;
  }

  .equip-preview {
    flex-direction: column;
  }

  .material-row {
    grid-template-columns: 40px 1fr;
    gap: 6px;
  }

  .material-qty,
  .price-input-wrapper,
  .material-subtotal {
    grid-column: 2;
  }

  .cost-summary {
    flex-direction: column;
    gap: 16px;
    text-align: center;
    padding: 20px;
  }

  .cost-amount {
    font-size: 28px;
  }
}

/* ---------- 動畫 ---------- */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.fade-in {
  animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}

@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

.shimmer {
  background: linear-gradient(90deg, transparent 25%, rgba(255,255,255,0.08) 50%, transparent 75%);
  background-size: 200% 100%;
  animation: shimmer 2s infinite;
}

/* ---------- 工具提示 ---------- */
[data-tooltip] {
  position: relative;
}

[data-tooltip]::after {
  content: attr(data-tooltip);
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%) scale(0.9);
  padding: 6px 12px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-primary);
  background: rgba(20, 28, 50, 0.95);
  border: 1px solid var(--border-dim);
  border-radius: var(--radius-sm);
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: var(--transition);
  z-index: 10;
}

[data-tooltip]:hover::after {
  opacity: 1;
  transform: translateX(-50%) scale(1);
}

.cart-item { display: flex; align-items: center; justify-content: space-between; background: rgba(12,18,34,0.6); border: 1px solid var(--border-dim); padding: 10px; border-radius: 8px; margin-bottom: 8px; transition: all 0.3s; }
.cart-item:hover { border-color: rgba(100,160,255,0.4); background: rgba(16,24,46,0.8); }
.cart-item-info { display: flex; align-items: center; gap: 12px; }
.cart-qty-ctrl { display: flex; align-items: center; gap: 6px; }
.qty-btn { background: rgba(30,40,70,0.8); border:none; color:#fff; width:28px; height:28px; border-radius:4px; cursor:pointer; font-weight:bold; }
.qty-btn:hover { background: var(--accent-blue); }
.remove-btn { color: var(--accent-red); cursor:pointer; background:none; border:none; font-size:18px; margin-left: 8px; }
.remove-btn:hover { transform: scale(1.1); }
.cart-section h3 { margin-bottom: 16px; font-size: 16px; color: var(--text-secondary); display:flex; align-items:center; gap:8px;}
  </style>
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <div class="logo-icon">A2</div>
        <div>

/**
 * 新版 AION2 裝備製作成本計算器 (系列化購物車模式)
 */

const SERIES_NAMES = ["應龍王", "夔龍王", "閃耀的應龍王", "閃耀的夔龍王", "應龍霸王", "夔龍霸王", "閃耀的應龍霸王", "閃耀的夔龍霸王", "盧德萊", "守衛者軍團長", "執政官軍團長", "被侵蝕的支配者"];
let ALL_SERIES = {};

let cart = {}; // { "裝備名稱": 數量 }
let currentSeries = null;
const STORAGE_PREFIX = 'aion2_price_';

function init() {
  processSeries();
  renderEquipmentList();
  renderSeriesDetail();
  renderCart();
}

function processSeries() {
  SERIES_NAMES.forEach(s => ALL_SERIES[s] = { weapons: {}, guarders: {}, grade: 'Normal' });
  
  Object.entries(RECIPES).forEach(([name, recipe]) => {
    let matchedSeries = null;
    let maxLen = 0;
    SERIES_NAMES.forEach(s => {
      if (name.startsWith(s) && s.length > maxLen) {
        matchedSeries = s;
        maxLen = s.length;
      }
    });
    
    if (matchedSeries) {
      ALL_SERIES[matchedSeries].grade = recipe.grade;
      if (recipe.category === 'Guarder') {
        ALL_SERIES[matchedSeries].guarders['Guarder'] = name;
      } else {
        ALL_SERIES[matchedSeries].weapons[recipe.category] = name;
      }
    }
  });
  
  // 移除沒有裝備的系列
  Object.keys(ALL_SERIES).forEach(s => {
    if(Object.keys(ALL_SERIES[s].weapons).length === 0 && Object.keys(ALL_SERIES[s].guarders).length === 0) {
      delete ALL_SERIES[s];
    }
  });
}

function renderEquipmentList() {
  const container = document.getElementById('equipment-list');
  let html = '';
  
  Object.entries(ALL_SERIES).forEach(([seriesName, data]) => {
    const isSelected = currentSeries === seriesName;
    const grade = data.grade.toLowerCase();
    
    html += `
      <div class="equipment-item ${isSelected ? 'selected' : ''}" onclick="selectSeries('${seriesName}')">
        <div class="item-icon grade-${grade}">
          <div class="default-item-icon" style="font-size: 20px;">🛡️</div>
        </div>
        <div>
          <div class="item-name ${grade}">${seriesName} 系列</div>
          <div class="item-category">${Object.keys(data.weapons).length} 種職業武器選擇</div>
        </div>
      </div>
    `;
  });
  
  container.innerHTML = html || '<div class="empty-state"><p>無可用的裝備系列</p></div>';
}

function selectSeries(seriesName) {
  currentSeries = seriesName;
  document.querySelectorAll('.equipment-item').forEach(el => el.classList.remove('selected'));
  renderEquipmentList();
  renderSeriesDetail();
}

function renderSeriesDetail() {
  const panel = document.getElementById('series-detail-panel');
  if (!currentSeries) {
    panel.innerHTML = `<div class="empty-state"><p>請從左側挑選裝備系列來開始配置</p></div>`;
    return;
  }
  
  const data = ALL_SERIES[currentSeries];
  const grade = data.grade.toLowerCase();
  
  let weaponOptions = '';
  Object.entries(data.weapons).forEach(([category, itemName]) => {
    weaponOptions += `<option value="${itemName}">${category === 'null' ? '武器' : (WEAPON_SUBTYPES[category] || category)} - ${itemName}</option>`;
  });
  
  let guarderHtml = '';
  if (data.guarders['Guarder']) {
    const gName = data.guarders['Guarder'];
    guarderHtml = `
      <div style="margin-top: 15px; display:flex; align-items:center; gap: 8px;">
        <input type="checkbox" id="add-guarder" value="${gName}" style="width: 18px; height: 18px;">
        <label for="add-guarder" style="color:var(--text-primary); cursor:pointer;">同時包含此系列備用裝備 / 臂甲 (${gName})</label>
      </div>
    `;
  }
  
  panel.innerHTML = `
    <div class="fade-in">
      <h3 style="margin-bottom: 20px; font-size: 18px;" class="${grade}">
        ✨ 配置【${currentSeries} 系列】裝備
      </h3>
      
      <div style="background: rgba(0,0,0,0.25); padding: 20px; border-radius: 8px; border: 1px solid var(--border-dim);">
        <label style="display:block; margin-bottom:10px; color:var(--text-secondary); font-weight: bold;">⚔️ 選擇您的職業武器：</label>
        <select id="series-weapon-select" class="price-input" style="width:100%; max-width: 500px; height: auto; min-height: 44px; padding: 8px 12px; font-size: 15px; cursor: pointer; line-height: 1.5;">
          ${weaponOptions}
        </select>
        
        ${guarderHtml}
        
        <div style="margin-top: 15px; display: flex; align-items: center; gap: 20px;">
          <label style="color:var(--text-dim); display:flex; align-items:center; gap:6px; opacity:0.6;">
             <input type="checkbox" disabled> 防具配置 (陸續開放)
          </label>
          <label style="color:var(--text-dim); display:flex; align-items:center; gap:6px; opacity:0.6;">
             <input type="checkbox" disabled> 飾品配置 (陸續開放)
          </label>
        </div>
        
        <div style="margin-top: 24px;">
          <button class="btn btn-primary" onclick="addSeriesToCart()" style="font-size: 15px; padding: 12px 24px;">
            ➕ 將選定裝備加入製作清單
          </button>
        </div>
      </div>
    </div>
  `;
}

function addSeriesToCart() {
  const weaponSelect = document.getElementById('series-weapon-select');
  let addedCount = 0;
  if (weaponSelect && weaponSelect.value) {
    _addToCart(weaponSelect.value);
    addedCount++;
  }
  
  const guarderCheck = document.getElementById('add-guarder');
  if (guarderCheck && guarderCheck.checked) {
    _addToCart(guarderCheck.value);
    addedCount++;
  }
  
  if (addedCount > 0) {
    showToast(`成功加入 ${addedCount} 件裝備至清單！`);
  }
}

function _addToCart(name) {
  if (cart[name]) cart[name]++;
  else cart[name] = 1;
  renderCart();
}

function updateCartQty(name, delta) {
  if (!cart[name]) return;
  cart[name] += delta;
  if (cart[name] <= 0) {
    delete cart[name];
  }
  renderCart();
}

function removeFromCart(name) {
  delete cart[name];
  renderCart();
}

function renderCart() {
  const container = document.getElementById('cart-container');
  const emptyState = `<div class="empty-state" style="padding: 30px;"><div class="icon" style="font-size: 40px; margin-bottom: 10px;">🛒</div><p>尚未選擇任何裝備</p></div>`;
  
  if (Object.keys(cart).length === 0) {
    container.innerHTML = emptyState;
    document.getElementById('materials-grid').innerHTML = '';
    calculateTotal();
    return;
  }
  
  let html = '';
  let aggMats = {};
  
  for (let [name, qty] of Object.entries(cart)) {
    const item = ITEMS[name];
    const recipe = RECIPES[name];
    const imageSrc = item && item.image ? item.image : null;
    const grade = recipe ? recipe.grade.toLowerCase() : 'normal';
    
    html += `
      <div class="cart-item fade-in">
        <div class="cart-item-info">
          <div class="material-icon grade-${grade}" style="width: 44px; height: 44px;">
            ${imageSrc ? `<img src="${imageSrc}">` : `<div class="default-item-icon">⚔</div>`}
          </div>
          <div>
             <div class="material-name ${grade}" style="font-size: 15px;">${escapeHtml(name)}</div>
             <div style="font-size: 11px; color: var(--text-dim); margin-top: 2px;">單件需求材料 x ${qty}</div>
          </div>
        </div>
        <div class="cart-qty-ctrl">
          <button class="qty-btn" onclick="updateCartQty('${escapeHtml(name)}', -1)">-</button>
          <span style="font-weight: bold; width: 30px; text-align: center; font-size: 16px;">${qty}</span>
          <button class="qty-btn" onclick="updateCartQty('${escapeHtml(name)}', 1)">+</button>
          <button class="remove-btn" onclick="removeFromCart('${escapeHtml(name)}')">🗑️</button>
        </div>
      </div>
    `;
    
    // 合併材料
    if (recipe && recipe.materials) {
      recipe.materials.forEach(mat => {
        if (!aggMats[mat.name]) aggMats[mat.name] = 0;
        aggMats[mat.name] += mat.qty * qty;
      });
    }
  }
  
  container.innerHTML = html;
  renderMaterials(aggMats);
}

function renderMaterials(aggMats) {
  const grid = document.getElementById('materials-grid');
  let html = '';
  let idx = 0;
  
  for (let [matName, totalQty] of Object.entries(aggMats)) {
    const item = ITEMS[matName];
    const imageSrc = item && item.image ? item.image : null;
    const grade = item ? item.grade.toLowerCase() : 'normal';
    const savedPrice = loadPrice(matName);
    
    html += `
      <div class="material-row fade-in" style="animation-delay:${idx * 0.05}s">
        <div class="material-icon grade-${grade}">
          ${imageSrc ? `<img src="${imageSrc}" loading="lazy">` : `<div class="default-item-icon">📦</div>`}
        </div>
        <div class="material-info">
          <div class="material-name ${grade}" title="${escapeHtml(matName)}">${escapeHtml(matName)}</div>
        </div>
        <div class="material-qty">
          x <strong>${totalQty.toLocaleString()}</strong>
        </div>
        <div class="price-input-wrapper">
          <span class="price-currency">💰</span>
          <input type="text" class="price-input" placeholder="輸入單價" 
                 data-material="${escapeHtml(matName)}" data-qty="${totalQty}" 
                 value="${savedPrice || ''}" oninput="onPriceInput(this)" id="price-${idx}">
        </div>
        <div class="material-subtotal ${savedPrice ? 'has-value' : ''}" id="subtotal-${idx}">
          ${savedPrice ? formatKinah(savedPrice * totalQty) : '—'}
        </div>
      </div>
    `;
    idx++;
  }
  
  grid.innerHTML = html;
  calculateTotal();
}

function onPriceInput(input) {
  const raw = input.value.replace(/[^0-9]/g, '');
  const price = parseInt(raw) || 0;
  const qty = parseInt(input.dataset.qty) || 0;
  const matName = input.dataset.material;
  const idx = input.id.replace('price-', '');
  const subtotalEl = document.getElementById(`subtotal-${idx}`);
  
  if (raw) input.value = parseInt(raw).toLocaleString();
  
  if (price > 0) {
    subtotalEl.textContent = formatKinah(price * qty);
    subtotalEl.classList.add('has-value');
    savePrice(matName, price);
  } else {
    subtotalEl.textContent = '—';
    subtotalEl.classList.remove('has-value');
    removePrice(matName);
  }
  
  calculateTotal();
}

function calculateTotal() {
  let total = 0;
  let filledCount = 0;
  const inputs = document.querySelectorAll('.price-input');
  
  inputs.forEach(input => {
    const raw = input.value.replace(/[^0-9]/g, '');
    const price = parseInt(raw) || 0;
    const qty = parseInt(input.dataset.qty) || 0;
    if (price > 0) {
      total += price * qty;
      filledCount++;
    }
  });
  
  const amountEl = document.getElementById('total-amount');
  const infoEl = document.getElementById('total-info');
  
  if (amountEl) {
    amountEl.textContent = total > 0 ? total.toLocaleString() : '0';
  }
  if (infoEl) {
    if (inputs.length === 0) {
      infoEl.textContent = '載入對應材料後方能計算總額';
    } else {
      infoEl.textContent = `輸入材料市價以試算總和 (${filledCount}/${inputs.length})`;
    }
  }
}

function clearAllPrices() {
  if (!confirm('確定要清除所有已輸入的材料價格嗎？')) return;
  document.querySelectorAll('.price-input').forEach(input => {
    input.value = '';
    removePrice(input.dataset.material);
  });
  document.querySelectorAll('.material-subtotal').forEach(el => {
    el.textContent = '—';
    el.classList.remove('has-value');
  });
  calculateTotal();
}

function exportReport() {
  if (Object.keys(cart).length === 0) return showToast('購物車清單目前為空');
  
  let text = `═══ AION2 系列裝備成本估算報表 ═══\n【規劃製作清單】\n`;
  for(let [name, qty] of Object.entries(cart)) {
    text += `- ${name} (數目: ${qty})\n`;
  }
  text += `──────────────────\n【需求總材料預算明細】\n`;
  
  let total = 0;
  document.querySelectorAll('.price-input').forEach(input => {
    const matName = input.dataset.material;
    const qty = input.dataset.qty;
    const raw = input.value.replace(/[^0-9]/g, '');
    const price = parseInt(raw) || 0;
    const subtotal = price * qty;
    
    total += subtotal;
    text += `${matName} x${qty}`;
    if (price > 0) {
      text += ` | 單價: ${price.toLocaleString()} | 預設: ${subtotal.toLocaleString()}\n`;
    } else {
      text += ` | 金額待補\n`;
    }
  });
  
  text += `──────────────────\n`;
  text += `💰 總評估成本約為：${total.toLocaleString()} 基納\n`;
  text += `═══════════════════\n`;
  
  navigator.clipboard.writeText(text)
    .then(() => showToast('報表內容已複製到您的剪貼簿！'))
    .catch(() => showToast('抱歉，複製發生錯誤，請手動複製'));
}

// Utils
function formatKinah(amount) {
  if (amount >= 100000000) return (amount / 100000000).toFixed(1) + '億';
  if (amount >= 10000) return (amount / 10000).toFixed(1) + '萬';
  return amount.toLocaleString();
}
function escapeHtml(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }
function savePrice(name, price) { try { localStorage.setItem(STORAGE_PREFIX + name, price.toString()); } catch(e){} }
function loadPrice(name) { try { const v = localStorage.getItem(STORAGE_PREFIX + name); return v ? parseInt(v) : null; } catch(e){ return null; } }
function removePrice(name) { try { localStorage.removeItem(STORAGE_PREFIX + name); } catch(e){} }
function showToast(msg) {
  let toast = document.getElementById('toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'toast';
    toast.style.cssText = `position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);padding:12px 24px;background:rgba(0,212,255,0.15);color:#00d4ff;border:1px solid rgba(0,212,255,0.3);border-radius:12px;font-size:14px;pointer-events:none;opacity:0;transition:all 0.3s;z-index:9999;backdrop-filter:blur(4px);`;
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.style.opacity = '1';
  toast.style.transform = 'translateX(-50%) translateY(0)';
  setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateX(-50%) translateY(20px)'; }, 2000);
}

document.addEventListener('DOMContentLoaded', init);

  </script>
