<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">

  <style>
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background-color: #060a14;
      color: #e8ecf4;
      padding: 40px;
      line-height: 1.6;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: rgba(14, 22, 42, 0.85);
      padding: 30px;
      border-radius: 12px;
      border: 1px solid rgba(100, 160, 255, 0.15);
    }
    h1 {
      text-align: center;
      color: #00d4ff;
    }
    .links {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-top: 30px;
    }
    .links a {
      display: block;
      padding: 15px 20px;
      background: rgba(30, 40, 70, 0.5);
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 18px;
      border: 1px solid transparent;
      transition: all 0.3s ease;
    }
    .links a:hover {
      background: rgba(0, 212, 255, 0.1);
      border-color: rgba(0, 212, 255, 0.4);
      color: #00d4ff;
      transform: translateX(5px);
